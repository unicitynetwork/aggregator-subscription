x-bft-base: &bft-base
  platform: linux/amd64
  user: "${USER_UID:-0}:${USER_GID:-0}"
  image: "${BFT_CORE_IMAGE:-ghcr.io/unicitynetwork/bft-core:ceceacd11b7a735de74ce17884a3a45e0db1748d}"
  pull_policy: always

x-aggregator-base: &aggregator-base
  image: "${AGGREGATOR_GO_IMAGE:-ghcr.io/unicitynetwork/aggregator-go:sha-9a9ed24}"
  pull_policy: always
  platform: linux/amd64
  user: "${USER_UID:-0}:${USER_GID:-0}"
  restart: unless-stopped
  networks:
    - default

services:
  # ===========================================================================
  # BFT Rootchain - 4 Root Nodes
  # ===========================================================================
  bft-root-genesis-gen:
    <<: *bft-base
    container_name: bft-root-genesis-gen
    volumes:
      - ./data/bft-sharding/genesis-root:/genesis
    networks:
      - default
    entrypoint: ["/busybox/sh", "-c"]
    command:
      - |
        set -eu
        if [ -f /genesis/root_0/node-info.json ] && [ -f /genesis/root_1/node-info.json ] && \
           [ -f /genesis/root_2/node-info.json ] && [ -f /genesis/root_3/node-info.json ] && \
           [ -f /genesis/trust-base.json ]; then
          echo "Root genesis files already exist, skipping initialization."
        else
          mkdir -p /genesis/root_0 /genesis/root_1 /genesis/root_2 /genesis/root_3 &&
          for root in 0 1 2 3; do
            if [ -f "/genesis/root_$${root}/node-info.json" ] && [ -f "/genesis/root_$${root}/keys.json" ]; then
              echo "root_$${root} genesis already exists, skipping init."
            else
              echo "Creating root_$${root} genesis..." &&
              ubft root-node init --home "/genesis/root_$${root}" -g
            fi
          done &&
          echo "Creating 4-node root trust base..." &&
          ubft trust-base generate \
            --home /genesis \
            --epoch 1 \
            --epoch-start 1 \
            --network-id 3 \
            --node-info /genesis/root_0/node-info.json \
            --node-info /genesis/root_1/node-info.json \
            --node-info /genesis/root_2/node-info.json \
            --node-info /genesis/root_3/node-info.json &&
          for root in 0 1 2 3; do
            echo "Signing root trust base with root_$${root}..." &&
            ubft trust-base sign --home "/genesis/root_$${root}" --trust-base /genesis/trust-base.json
          done
        fi
        chmod -R 755 /genesis/root_0 /genesis/root_1 /genesis/root_2 /genesis/root_3
        chmod 644 /genesis/trust-base.json
        ls -l /genesis

  bft-root-0: &bft-root-node
    <<: *bft-base
    container_name: bft-root-0
    ports:
      - "8002:8002"
    volumes:
      - ./data/bft-sharding/genesis-root:/genesis
    depends_on:
      bft-root-genesis-gen:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "8000"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - default
    entrypoint: ["/busybox/sh", "-c"]
    command:
      - |
        set -eu
        echo "Starting root_0..." &&
        exec ubft root-node run \
          --home /genesis/root_0 \
          --address "/ip4/0.0.0.0/tcp/8000" \
          --trust-base /genesis/trust-base.json \
          --rpc-server-address "0.0.0.0:8002"

  bft-root-1:
    <<: *bft-root-node
    container_name: bft-root-1
    ports:
      - "8003:8002"
    depends_on:
      bft-root-0:
        condition: service_healthy
    command:
      - |
        set -eu
        ROOT0_NODE_ID=$$(grep -o '"nodeId": "[^"]*"' /genesis/root_0/node-info.json | head -1 | cut -d'"' -f4)
        echo "Starting root_1..." &&
        exec ubft root-node run \
          --home /genesis/root_1 \
          --address "/ip4/0.0.0.0/tcp/8000" \
          --bootnodes "/dns4/bft-root-0/tcp/8000/p2p/$$ROOT0_NODE_ID" \
          --trust-base /genesis/trust-base.json \
          --rpc-server-address "0.0.0.0:8002"

  bft-root-2:
    <<: *bft-root-node
    container_name: bft-root-2
    ports:
      - "8004:8002"
    depends_on:
      bft-root-0:
        condition: service_healthy
    command:
      - |
        set -eu
        ROOT0_NODE_ID=$$(grep -o '"nodeId": "[^"]*"' /genesis/root_0/node-info.json | head -1 | cut -d'"' -f4)
        echo "Starting root_2..." &&
        exec ubft root-node run \
          --home /genesis/root_2 \
          --address "/ip4/0.0.0.0/tcp/8000" \
          --bootnodes "/dns4/bft-root-0/tcp/8000/p2p/$$ROOT0_NODE_ID" \
          --trust-base /genesis/trust-base.json \
          --rpc-server-address "0.0.0.0:8002"

  bft-root-3:
    <<: *bft-root-node
    container_name: bft-root-3
    ports:
      - "8005:8002"
    depends_on:
      bft-root-0:
        condition: service_healthy
    command:
      - |
        set -eu
        ROOT0_NODE_ID=$$(grep -o '"nodeId": "[^"]*"' /genesis/root_0/node-info.json | head -1 | cut -d'"' -f4)
        echo "Starting root_3..." &&
        exec ubft root-node run \
          --home /genesis/root_3 \
          --address "/ip4/0.0.0.0/tcp/8000" \
          --bootnodes "/dns4/bft-root-0/tcp/8000/p2p/$$ROOT0_NODE_ID" \
          --trust-base /genesis/trust-base.json \
          --rpc-server-address "0.0.0.0:8002"

  # ===========================================================================
  # BFT Shard Configuration
  # ===========================================================================
  bft-shard-genesis-gen:
    <<: *bft-base
    container_name: bft-shard-genesis-gen
    volumes:
      - ./data/bft-sharding/genesis-root:/root-genesis
      - ./data/bft-sharding/genesis:/genesis
    depends_on:
      bft-root-genesis-gen:
        condition: service_completed_successfully
    networks:
      - default
    entrypoint: ["/busybox/sh", "-c"]
    command:
      - |
        set -eu
        cp /root-genesis/trust-base.json /genesis/trust-base.json
        if [ -f /genesis/shard_0/node-info.json ] && [ -f /genesis/shard_0/shard-conf-7_0.json ] && \
           [ -f /genesis/shard_1/node-info.json ] && [ -f /genesis/shard_1/shard-conf-7_0.json ]; then
          echo "Shard genesis already exists, skipping initialization."
        else
          mkdir -p /genesis/shard_0 /genesis/shard_1 &&
          for shard in 0 1; do
            if [ -f "/genesis/shard_$${shard}/node-info.json" ] && [ -f "/genesis/shard_$${shard}/keys.json" ]; then
              echo "shard_$${shard} genesis already exists, skipping init."
            else
              echo "Creating shard_$${shard} genesis..." &&
              ubft shard-node init --home "/genesis/shard_$${shard}" --generate
            fi
          done &&
          echo "Creating shard_0 config (prefix=0, shardId=0x40)..." &&
          rm -f /genesis/shard_0/shard-conf-7_0.json /genesis/shard_0/shard-conf-7_1.json &&
          ubft shard-conf generate --home /genesis/shard_0 --t2-timeout 5000 --network-id 3 --partition-id 7 --partition-type-id 7 --shard-id 0x40 --epoch 0 --epoch-start 10 --node-info=/genesis/shard_0/node-info.json &&
          echo "Creating shard_1 config (prefix=1, shardId=0xC0)..." &&
          rm -f /genesis/shard_1/shard-conf-7_0.json /genesis/shard_1/shard-conf-7_1.json &&
          ubft shard-conf generate --home /genesis/shard_1 --t2-timeout 5000 --network-id 3 --partition-id 7 --partition-type-id 7 --shard-id 0xC0 --epoch 0 --epoch-start 10 --node-info=/genesis/shard_1/node-info.json
        fi
        chmod -R 755 /genesis/shard_0 /genesis/shard_1
        chmod 644 /genesis/trust-base.json /genesis/shard_0/shard-conf-7_0.json /genesis/shard_1/shard-conf-7_0.json
        ls -l /genesis

  upload-configurations:
    image: curlimages/curl:8.13.0
    user: "${USER_UID:-1001}:${USER_GID:-1001}"
    container_name: bft-upload-configurations
    depends_on:
      bft-root-0:
        condition: service_healthy
      bft-root-1:
        condition: service_healthy
      bft-root-2:
        condition: service_healthy
      bft-root-3:
        condition: service_healthy
      bft-shard-genesis-gen:
        condition: service_completed_successfully
    restart: on-failure
    volumes:
      - ./data/bft-sharding/genesis:/genesis
    networks:
      - default
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -eu
        for root in 0 1 2 3; do
          for shard in 0 1; do
            conf="/genesis/shard_$${shard}/shard-conf-7_0.json"
            attempt=1
            while [ "$${attempt}" -le 15 ]; do
              if curl -sf -X PUT -H 'Content-Type: application/json' -d @"$${conf}" "http://bft-root-$${root}:8002/api/v1/configurations" >/dev/null; then
                echo "Uploaded $$(basename "$${conf}") for shard_$${shard} to bft-root-$${root}"
                break
              fi
              if [ "$${attempt}" -eq 15 ]; then
                echo "Failed to upload $${conf} to bft-root-$${root} after $${attempt} attempts" >&2
                exit 1
              fi
              echo "Retry $${attempt}/15 uploading $${conf} to bft-root-$${root}..."
              attempt=$$((attempt + 1))
              sleep 2
            done
          done
        done

  # ===========================================================================
  # Aggregator Storage
  # ===========================================================================
  mongodb:
    image: mongo:7.0
    container_name: aggregator-mongodb
    user: "${USER_UID:-0}:${USER_GID:-0}"
    restart: unless-stopped
    volumes:
      - ./data/bft-sharding/mongodb_data:/data/db
    command: ["--replSet", "rs0", "--bind_ip_all", "--noauth"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "try { rs.status().ok } catch(e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'mongodb:27017'}]}) }"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: aggregator-redis
    user: "${USER_UID:-0}:${USER_GID:-0}"
    restart: unless-stopped
    volumes:
      - ./data/bft-sharding/redis_data:/data
    networks:
      - default
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===========================================================================
  # BFT Shard Aggregators
  # ===========================================================================
  aggregator-bft-shard0: &aggregator-bft-base
    <<: *aggregator-base
    container_name: aggregator-bft-shard0
    ports:
      - "3001:3000"
    volumes:
      - ./data/bft-sharding/genesis:/app/bft-config
      - ./data/bft-sharding/genesis-root:/app/bft-root-config:ro
      - ./logs/bft-shard0:/app/logs
    depends_on:
      upload-configurations:
        condition: service_completed_successfully
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: &aggregator-bft-env
      PORT: "3000"
      HOST: "0.0.0.0"
      CONCURRENCY_LIMIT: "5000"
      ENABLE_DOCS: "true"
      ENABLE_CORS: "true"

      MONGODB_URI: "mongodb://mongodb:27017/aggregator?replicaSet=rs0&directConnection=true"
      MONGODB_DATABASE: "aggregator_bft_shard_0"
      MONGODB_CONNECT_TIMEOUT: "10s"
      MONGODB_SERVER_SELECTION_TIMEOUT: "5s"

      DISABLE_HIGH_AVAILABILITY: "true"

      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ""
      REDIS_DB: "0"
      REDIS_POOL_SIZE: "100"
      REDIS_MIN_IDLE_CONNS: "10"
      USE_REDIS_FOR_COMMITMENTS: "true"
      REDIS_STREAM_NAME: "commitments:bft-shard:0"
      REDIS_FLUSH_INTERVAL: "50ms"
      REDIS_MAX_BATCH_SIZE: "2000"

      LOG_LEVEL: "${LOG_LEVEL:-info}"
      LOG_FORMAT: "json"
      LOG_ENABLE_JSON: "true"
      LOG_FILE_PATH: "/app/logs/aggregator.log"

      BATCH_LIMIT: "1000"
      MAX_COMMITMENTS_PER_ROUND: "10000"

      SHARDING_MODE: "bft-shard"
      SIGNING_KEY_FILE: "/app/bft-config/shard_0/keys.json"
      BFT_ENABLED: "true"
      BFT_ADDRESS: "/ip4/0.0.0.0/tcp/9001"
      BFT_ANNOUNCE_ADDRESSES: "/dns4/aggregator-bft-shard0/tcp/9001"
      BFT_RPC_ADDRESS: "http://bft-root-0:8002"
      BFT_SHARD_CONF_FILE: "/app/bft-config/shard_0/shard-conf-7_0.json"
      BFT_TRUST_BASE_FILES: "/app/bft-config/trust-base.json"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ROOT0_NODE_ID=$$(grep -o '"nodeId": "[^"]*"' /app/bft-root-config/root_0/node-info.json | head -1 | cut -d'"' -f4)
        ROOT1_NODE_ID=$$(grep -o '"nodeId": "[^"]*"' /app/bft-root-config/root_1/node-info.json | head -1 | cut -d'"' -f4)
        ROOT2_NODE_ID=$$(grep -o '"nodeId": "[^"]*"' /app/bft-root-config/root_2/node-info.json | head -1 | cut -d'"' -f4)
        ROOT3_NODE_ID=$$(grep -o '"nodeId": "[^"]*"' /app/bft-root-config/root_3/node-info.json | head -1 | cut -d'"' -f4)
        if [ -z "$$ROOT0_NODE_ID" ] || [ -z "$$ROOT1_NODE_ID" ] || [ -z "$$ROOT2_NODE_ID" ] || [ -z "$$ROOT3_NODE_ID" ]; then
          echo "Error: could not extract all root node IDs" >&2
          exit 1
        fi
        export BFT_BOOTSTRAP_ADDRESSES="/dns4/bft-root-0/tcp/8000/p2p/$$ROOT0_NODE_ID,/dns4/bft-root-1/tcp/8000/p2p/$$ROOT1_NODE_ID,/dns4/bft-root-2/tcp/8000/p2p/$$ROOT2_NODE_ID,/dns4/bft-root-3/tcp/8000/p2p/$$ROOT3_NODE_ID"
        echo "Set BFT_BOOTSTRAP_ADDRESSES to: $$BFT_BOOTSTRAP_ADDRESSES"
        exec /app/aggregator
    healthcheck:
      test: ["CMD", "nc", "-zv", "localhost", "3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  aggregator-bft-shard1:
    <<: *aggregator-bft-base
    container_name: aggregator-bft-shard1
    ports:
      - "3002:3000"
    volumes:
      - ./data/bft-sharding/genesis:/app/bft-config
      - ./data/bft-sharding/genesis-root:/app/bft-root-config:ro
      - ./logs/bft-shard1:/app/logs
    environment:
      <<: *aggregator-bft-env
      MONGODB_DATABASE: "aggregator_bft_shard_1"
      REDIS_STREAM_NAME: "commitments:bft-shard:1"
      SIGNING_KEY_FILE: "/app/bft-config/shard_1/keys.json"
      BFT_ADDRESS: "/ip4/0.0.0.0/tcp/9002"
      BFT_ANNOUNCE_ADDRESSES: "/dns4/aggregator-bft-shard1/tcp/9002"
      BFT_SHARD_CONF_FILE: "/app/bft-config/shard_1/shard-conf-7_0.json"

  # ===========================================================================
  # Subscription Gateway
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: subscription-postgres
    environment:
      POSTGRES_DB: aggregator
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: aggregator
    volumes:
      - subscription-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

  subscription-proxy:
    # TODO(bft-sharding-routing): switch back to a pinned GHCR commit image after this branch is merged and CI publishes it.
    image: "${AGGREGATOR_SUBSCRIPTION_IMAGE:-aggregator-subscription:bft-sharding-routing-local}"
    build:
      context: .
      dockerfile: Dockerfile
    pull_policy: build
    platform: linux/amd64
    user: "${USER_UID:-0}:${USER_GID:-0}"
    container_name: subscription-proxy
    environment:
      PROXY_ARGS: ${PROXY_ARGS:---port 8080 --trust-base /etc/aggregator/trust-base.json}
      SHARD_CONFIG_URI: "file:///etc/aggregator/shard-config.json"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      SERVER_SECRET: ${SERVER_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DB_URL: jdbc:postgresql://postgres:5432/aggregator
      DB_USER: aggregator
      DB_PASSWORD: aggregator
    ports:
      - "${PROXY_PORT:-8080}:8080"
    volumes:
      - ${SHARD_CONFIG_FILE:-./scripts/sharding/shard-config-bft.json}:/etc/aggregator/shard-config.json:ro
      - ./data/bft-sharding/genesis/trust-base.json:/etc/aggregator/trust-base.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      aggregator-bft-shard0:
        condition: service_healthy
      aggregator-bft-shard1:
        condition: service_healthy
      bft-shard-genesis-gen:
        condition: service_completed_successfully
    networks:
      - default
    restart: unless-stopped

volumes:
  subscription-postgres-data:

networks:
  default:
