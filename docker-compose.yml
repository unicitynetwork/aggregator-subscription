services:
  postgres:
    image: postgres:15-alpine
    container_name: aggregator-postgres
    environment:
      POSTGRES_DB: aggregator
      POSTGRES_USER: aggregator
      POSTGRES_PASSWORD: aggregator
    #    ports:
    #      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aggregator"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aggregator-network

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aggregator-proxy
    environment:
      # Proxy configuration - container always listens on 8080 internally
      # BFT aggregator upstreams support h2c. Set GATEWAY_UPSTREAM_H2C=false when proxying HTTP/1-only upstreams.
      GATEWAY_UPSTREAM_H2C: ${GATEWAY_UPSTREAM_H2C:-true}
      PROXY_ARGS: "--port 8080 --enable-h2c --worker-threads ${GATEWAY_WORKER_THREADS:-64} --protected-methods ${PROTECTED_METHODS:-certification_request} --token-type-ids-url file:///etc/aggregator/test-token-types.json"
      # Shard configuration
      SHARD_CONFIG_URI: "file:///etc/aggregator/shard-config.json"
      # Admin dashboard configuration
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      # Server secret for API operations (must be hex string with even length)
      SERVER_SECRET: ${SERVER_SECRET:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      # Logging configuration (used by logback.xml)
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Database configuration
      DB_URL: jdbc:postgresql://postgres:5432/aggregator
      DB_USER: aggregator
      DB_PASSWORD: aggregator
    ports:
      # Map host port (configurable) to container port 8080 (fixed)
      - "${PROXY_PORT:-8080}:8080"
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aggregator-network
      - aggregator-go_default
    extra_hosts:
      # Allow proxy to connect to host machine (for local aggregator)
      - "host.docker.internal:host-gateway"
    volumes:
      - ${SHARD_CONFIG_FILE:-./scripts/sharding/shard-config-bft-host.json}:/etc/aggregator/shard-config.json:ro
      - ./src/test/resources/test-token-types.json:/etc/aggregator/test-token-types.json:ro
    restart: unless-stopped

volumes:
  postgres-data:

networks:
  aggregator-network:
    driver: bridge
  aggregator-go_default:
    external: true
